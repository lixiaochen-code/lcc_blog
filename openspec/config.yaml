project:
  name: AI 驱动知识库博客项目
  description: >-
    一个由 AI 辅助甚至半自动维护的知识库型博客 / 文档网站，支持 AI 自主选择工具、
    接入 MCP 获取远程知识、对内容进行增删改查与目录治理，并具备权限、审批、审计、回滚等企业级控制能力。
  language: zh-CN

openspec:
  specs_dir: openspec/specs
  changes_dir: openspec/changes
  source_documents:
    - PRD.md
    - Spec.md
    - TECHNICAL.md
  principles:
    - 严格遵守本规格
    - 先实现稳定骨架，再逐步增强
    - 所有敏感操作必须服务端鉴权
    - 所有 AI 写入必须保留 change set
    - 所有高风险操作必须有审计日志
    - 工具必须先定义 schema 再接入
    - Provider / MCP 必须做抽象，不允许写死业务逻辑
    - 优先可维护性，不追求一次做满
  workflow:
    - proposal.md
    - design.md
    - tasks.md
    - delta spec
    - 实现
    - verify
    - archive
  domains:
    - auth
    - content
    - taxonomy
    - search
    - ai-search
    - ai-content-ops
    - approvals
    - providers
    - mcp-gateway
    - audit
    - admin-console
    - agent-orchestration
